<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <header>
        <a href="#">
            <img src="img/logo.png" alt="logo">
        </a>
        <div class="left-menu">
            <div>
                <div class="div-links">
                    <a href="#" class="links">Галерея</a>
                    <a href="#" class="links">Про нас</a>
                </div>
                <a href="#" class="btn">Замовити Дзвінок</a>
            </div>
        </div>
    </header>
    <main>
        <div class="canvas">
            <img src="img/canvas.png" alt="">
        </div>
        <div class="settings">
            <div class="settings-block">
                <h1>Виберіть розмір</h1>
                <div class="size-fixed">
                    <label>
                        <input type="radio" name="fixed-radio">
                        <span>30х30</span>
                    </label>
                    <label>
                        <input type="radio" name="fixed-radio">
                        <span>30х90</span>
                    </label>
                    <label>
                        <input type="radio" name="fixed-radio">
                        <span>90х120</span>
                    </label>
                    <label>
                        <input type="radio" name="fixed-radio">
                        <span>90x150</span>
                    </label> 
                    <a href="#" class="size-btn">Задати розмір</a>
                </div>
                <div class="size-user">
                    <div>
                        <p>Ширина</p>
                        <input type="number" name="" id="">
                    </div>
                    <span class="cross">X</span>
                    <div>
                        <p>Висота</p>
                        <input type="number" name="" id="">
                    </div>
                    <a href="#" class="size-btn">Підрахувати</a>
                </div>
                <hr>
                <h1>Додаткові Опції</h1>
                <div class="options">
                    <div>
                        <label>
                            <input type="checkbox" name="" id="">
                            <span>дорожче полотно</span>
                        </label>
                        <label>
                            <input type="checkbox" name="" id="">
                            <span>дорожче полотно</span>
                        </label>
                        <label>
                            <input type="checkbox" name="" id="">
                            <span>дорожче полотно</span>
                        </label>
                    </div>
                    <div></div>
                </div>
            </div>
        </div>
    </main>
    <footer></footer>
</body>

</html>
