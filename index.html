<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <header>
        <a href="#">
            <img src="img/logo.png" alt="logo">
        </a>
        <div class="left-menu">
            <div>
                <div class="div-links">
                    <a href="#" class="links">Галерея</a>
                    <a href="#" class="links">Про нас</a>
                </div>
                <a href="#" class="btn">Замовити Дзвінок</a>
            </div>
        </div>
    </header>
    <main>
        <div class="canvas">
            <img src="img/canvas.png" alt="">
            <div class="size-change-div2">
                <div class="size-change-div"></div>
            </div>
        </div>
        <div class="settings">
            <div class="settings-block">
                <h1>Виберіть розмір</h1>
                <div class="size-fixed">
                    <label>
                        <input type="radio" name="fixed-radio" id="fixed1" value="30x30">
                        <span>30х30</span>
                    </label>
                    <label>
                        <input type="radio" name="fixed-radio" id="fixed2" value="30x90">
                        <span>30х90</span>
                    </label>
                    <label>
                        <input type="radio" name="fixed-radio" id="fixed3" value="90x120">
                        <span>90х120</span>
                    </label>
                    <label>
                        <input type="radio" name="fixed-radio" id="fixed4" value="90x150">
                        <span>90x150</span>
                    </label>
                    <a href="#" class="size-btn" id="fixedSizeBtn">Задати розмір</a>
                </div>
                <div class="size-user hidden">
                    <div>
                        <p>Ширина</p>
                        <input type="number" name="" id="width" min="1" max="450">
                    </div>
                    <span class="cross">X</span>
                    <div>
                        <p>Висота</p>
                        <input type="number" name="" id="height" min="1" max="450">
                    </div>
                    <a href="#" class="size-btn" id="size-btn">Підрахувати</a>
                </div>
                <hr>
                <h1 class="h1-add">Додаткові Опції</h1>
                <div class="options">
                    <div>
                        <label>
                            <input type="checkbox" name="" id="" class="add1">
                            <span class="checkmark"></span>
                            <span>Дорожче полотно</span>
                        </label>
                        <label>
                            <input type="checkbox" name="" id="bd" class="add2">
                            <span class="checkmark"></span>
                            <span>З рамкою</span>
                        </label>
                        <label>
                            <input type="checkbox" name="" id="" class="add3">
                            <span class="checkmark"></span>
                            <span>З доставкою (Нова Пошта)</span>
                        </label>
                    </div>
                    <div>
                        <p>+35 грн</p>
                        <p>+10 грн</p>
                        <p>+40 грн</p>
                    </div>
                </div>
                <div class="hid-bd">
                    <hr>
                    <label>
                        <input type="radio" name="bdCheck" id="" value="dashed" class="bd-style">
                        <span class="checkmark"></span>
                        <span>Dashed</span>
                    </label>
                    <label>
                        <input type="radio" name="bdCheck" id="" value="dotted" class="bd-style">
                        <span class="checkmark"></span>
                        <span>Dotted</span>
                    </label>
                    <label>
                        <input type="radio" name="bdCheck" id="" value="solid" class="bd-style">
                        <span class="checkmark"></span>
                        <span>Solid</span>
                    </label>
                    <input type="color" id="color">
                </div>
                <hr>
                <div class="buy">
                    <a href="#" class="buy-btn">придбати</a>
                    <p>Загальна сума: <div class="sumText">0</div> <span class="hrn">грн</span></p>
                </div>
            </div>
        </div>
    </main>
    <footer>
        © Kanvas. Всі права захищені
    </footer>
    <script src="scripts.js"></script>
</body>

</html>
